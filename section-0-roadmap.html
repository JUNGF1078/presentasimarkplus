<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Section 0 — Skills & Roadmap: Selling B2B with AI</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --navy:#27385c;--blue:#435f9c;--blue2:#5769aa;--steel:#6f98b2;
    --red:#e55e5e;--orange:#ed9e72;--green:#acc673;--purple:#a48bac;--peri:#879ac1;
    --ink:#eef2f9;--muted:#93a1b8;--faint:#7f8fb0;
    --line:#2c3f61;--line2:#3a4f74;--card:#20304e;--card2:#26385c;
    --display:"Nunito",ui-rounded,"Segoe UI Rounded",system-ui,sans-serif;
    --body:"Nunito","Franklin Gothic Book","Segoe UI",system-ui,sans-serif;
    --mono:"IBM Plex Mono",ui-monospace,Consolas,monospace;
  }
  *{box-sizing:border-box}
  html{scroll-behavior:smooth}
  html,body{margin:0;padding:0}
  body{font-family:var(--body);color:var(--ink);min-height:100vh;position:relative;overflow-x:hidden;
    background:radial-gradient(1300px 840px at 82% -12%,#33507f,#22314f 62%) fixed #22314f;}
  .memphis{position:fixed;inset:0;width:100%;height:100%;z-index:0;pointer-events:none;opacity:.13}
  .wrap{position:relative;z-index:1;max-width:1240px;margin:0 auto;padding:34px 26px 80px}
  a{color:inherit}

  /* language toggle */
  .langbar{display:flex;justify-content:flex-end;gap:6px;margin-bottom:8px}
  .langbar button{font-family:var(--mono);font-size:12px;font-weight:700;color:#cdd9ec;cursor:pointer;
    background:rgba(255,255,255,.05);border:1px solid var(--line);border-radius:999px;padding:6px 14px}
  .langbar button.on{background:var(--orange);color:#22314f;border-color:var(--orange)}

  .eyebrow{font-family:var(--mono);font-size:12px;letter-spacing:.18em;text-transform:uppercase;color:#cdd9ec;font-weight:600}
  .colorbar{display:flex;gap:5px;margin:14px 0}
  .colorbar i{width:34px;height:6px;border-radius:999px;display:block}
  h1{font-family:var(--display);font-size:clamp(27px,4.2vw,42px);line-height:1.05;letter-spacing:-.01em;font-weight:900;margin:0;max-width:26ch;text-wrap:balance}
  h1 .hl{color:#ed9e72}
  .lede{margin:14px 0 0;font-size:clamp(15px,1.5vw,17px);line-height:1.55;color:#c5d1e6;max-width:76ch}
  .srcnote{margin-top:14px;display:inline-flex;align-items:center;gap:9px;font-size:12.5px;color:#c5d1e6;
    background:rgba(255,255,255,.05);border:1px solid var(--line);border-radius:999px;padding:7px 14px}
  .srcnote b{color:#eef2f9}
  .journeyline{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-top:14px;font-family:var(--mono);font-size:12.5px;color:var(--muted)}
  .journeyline .from{color:#e88f8f;font-weight:700}.journeyline .to{color:#c6d98a;font-weight:700}.journeyline .arw{color:var(--faint)}

  .sec-h{display:flex;align-items:baseline;gap:12px;margin:48px 0 4px}
  .sec-n{font-family:var(--mono);font-size:13px;font-weight:700;color:var(--orange)}
  .sec-t{font-family:var(--display);font-size:clamp(20px,2.6vw,26px);font-weight:800;margin:0;color:#fff}
  .sec-s{margin:4px 0 20px;color:#c5d1e6;font-size:14px;max-width:84ch;line-height:1.55}

  /* ladder */
  .ranks{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
  @media(max-width:760px){.ranks{grid-template-columns:repeat(2,1fr)}}
  .rank{position:relative;text-align:left;cursor:pointer;font-family:inherit;color:var(--ink);
    background:var(--card);border:1px solid var(--line);border-top:5px solid var(--rc);border-radius:15px;
    padding:15px 16px 16px;transition:transform .15s ease,box-shadow .15s ease}
  .rank:hover{transform:translateY(-3px)}
  .rank[aria-selected="true"]{box-shadow:0 0 0 2px var(--rc),0 16px 34px -14px var(--rc);background:var(--card2)}
  .rank .glyph{font-size:26px;line-height:1;color:var(--rc)}
  .rank .rname{font-family:var(--display);font-weight:900;font-size:19px;margin-top:8px;color:var(--rc)}
  .rank .role{font-size:12.5px;color:#cdd9ec;font-weight:700;margin-top:1px}
  .rank .mult{font-family:var(--mono);font-size:22px;font-weight:700;color:#fff;margin-top:10px}
  .rank .pop{font-family:var(--mono);font-size:10.5px;color:var(--muted);margin-top:2px}
  .rank .rung{position:absolute;top:12px;right:14px;font-family:var(--mono);font-size:10px;font-weight:700;
    color:var(--rc);border:1px solid var(--rc);border-radius:6px;padding:2px 7px;opacity:.85}

  /* detail */
  .detail{margin-top:14px;background:var(--card);border:1px solid var(--line);border-left:5px solid var(--dc);
    border-radius:16px;padding:22px 24px;animation:fade .3s ease both}
  @keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
  .dhead{display:flex;align-items:center;gap:14px;flex-wrap:wrap}
  .dglyph{width:52px;height:52px;flex:none;border-radius:14px;display:grid;place-items:center;font-size:28px;color:#fff;background:var(--dc)}
  .dtitle{font-family:var(--display);font-size:23px;font-weight:900;color:#fff;margin:0}
  .drole{font-size:13px;color:var(--dc);font-weight:800}
  .dmeta{margin-left:auto;text-align:right;font-family:var(--mono)}
  .dmeta .m{font-size:24px;font-weight:700;color:#fff}.dmeta .p{font-size:11px;color:var(--muted)}
  .quote{margin:14px 0 4px;font-size:15px;font-style:italic;color:#dbe4f2;border-left:2px solid var(--dc);padding-left:12px;line-height:1.5}

  .cgt{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:18px}
  @media(max-width:720px){.cgt{grid-template-columns:1fr}}
  .box{background:rgba(255,255,255,.03);border:1px solid var(--line);border-radius:13px;padding:15px 16px}
  .box.gcur{border-top:3px solid var(--dc)}
  .box.ggoal{border-top:3px solid #acc673}
  .box.gtodo{grid-column:1/-1;border-top:3px solid #ed9e72}
  .blabel{font-family:var(--mono);font-size:10.5px;letter-spacing:.12em;text-transform:uppercase;font-weight:700;margin-bottom:9px;display:flex;align-items:center;gap:7px}
  .gcur .blabel{color:var(--dc)}.ggoal .blabel{color:#acc673}.gtodo .blabel{color:#ed9e72}
  .li{display:flex;gap:9px;font-size:13.5px;line-height:1.5;color:#dbe4f2;margin-bottom:8px}
  .li .b{flex:none;width:7px;height:7px;border-radius:2px;margin-top:6px;transform:rotate(45deg)}
  .gcur .li .b{background:var(--dc)}.gtodo .li .b{background:#ed9e72}
  .goaltext{font-size:15px;line-height:1.5;color:#eef2f9;font-weight:700}
  .todo-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px 20px}
  @media(max-width:720px){.todo-grid{grid-template-columns:1fr}}
  .practice{display:flex;flex-wrap:wrap;gap:8px;margin-top:14px}
  .plink{display:inline-flex;align-items:center;gap:8px;font-size:12.5px;font-weight:700;color:#eef2f9;text-decoration:none;
    background:rgba(255,255,255,.04);border:1px solid var(--line);border-radius:10px;padding:8px 12px}
  .plink:hover{border-color:var(--dc)}.plink .go{color:var(--dc)}
  .levelup{margin-top:14px;font-size:13.5px;color:#c5d1e6;background:rgba(237,158,114,.1);border:1px solid rgba(237,158,114,.35);border-radius:12px;padding:11px 14px;line-height:1.5}
  .levelup b{color:#ed9e72}

  /* journey */
  .jtabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
  .jtab{display:flex;align-items:center;gap:9px;cursor:pointer;font-family:inherit;color:#cdd9ec;
    background:var(--card);border:1px solid var(--line);border-radius:12px;padding:9px 13px;font-size:13px;font-weight:700}
  .jtab .num{font-family:var(--mono);font-size:11px;font-weight:700;width:22px;height:22px;border-radius:6px;display:grid;place-items:center;background:rgba(255,255,255,.06);color:var(--muted)}
  .jtab[aria-selected="true"]{border-color:var(--orange);color:#fff;background:var(--card2)}
  .jtab[aria-selected="true"] .num{background:var(--orange);color:#22314f}
  .jpanel{display:grid;grid-template-columns:1fr 1fr;gap:20px;align-items:stretch;
    background:var(--card);border:1px solid var(--line);border-radius:16px;padding:22px 24px;animation:fade .3s ease both}
  @media(max-width:820px){.jpanel{grid-template-columns:1fr}}
  .jleft .jname{font-family:var(--display);font-size:20px;font-weight:900;color:#fff;display:flex;align-items:center;gap:10px}
  .jleft .jstep{font-family:var(--mono);font-size:11px;color:var(--orange);font-weight:700}
  .jblock{margin-top:16px}
  .jblock .jl{font-family:var(--mono);font-size:10.5px;letter-spacing:.12em;text-transform:uppercase;font-weight:700;margin-bottom:6px}
  .jblock.do .jl{color:var(--peri)}.jblock.get .jl{color:#acc673}
  .jblock p{margin:0;font-size:14px;line-height:1.55;color:#dbe4f2}
  .jarrows{display:flex;gap:10px;margin-top:20px}
  .jbtn{font-family:inherit;font-size:13px;font-weight:800;cursor:pointer;border-radius:10px;padding:9px 15px;border:1px solid var(--line2);background:rgba(255,255,255,.05);color:#eef2f9}
  .jbtn.p{background:var(--orange);color:#22314f;border-color:var(--orange)}

  /* mockups */
  .jright{display:flex;align-items:center;justify-content:center}
  .mk{width:100%;font-family:var(--mono);font-size:12px;border-radius:12px;overflow:hidden;border:1px solid var(--line2);box-shadow:0 14px 34px rgba(10,16,30,.4)}
  .mk-bar{display:flex;align-items:center;gap:6px;padding:8px 12px;background:#182338;border-bottom:1px solid var(--line)}
  .mk-bar i{width:9px;height:9px;border-radius:50%}
  .mk-bar span{margin-left:8px;color:var(--muted);font-size:10.5px}
  .mk-body{padding:14px 16px;background:#141f34;line-height:1.85;color:#cdd9ec}
  .mk-body .dim{color:#7f8fb0}
  .mk-body .warn{color:#ed9e72}
  .mk-body .add{color:#acc673}
  .mk-body .head{color:#ed9e72;font-weight:700}
  .tagx{font-size:9.5px;background:rgba(135,154,193,.18);border:1px solid var(--line2);border-radius:5px;padding:1px 6px;color:#aebbd6;margin-left:6px}
  .mk .flag{color:#a9b7d3;background:rgba(126,147,207,.12);border-left:2px solid #7e93cf;border-radius:6px;padding:6px 9px;margin:8px 0;display:block}
  .mk .rev{color:#acc673}
  .mk .okrow{color:#acc673;font-weight:700;margin-top:8px}
  .mk .kpi{margin-top:8px;display:inline-block;background:rgba(172,198,115,.16);border:1px solid rgba(172,198,115,.4);border-radius:8px;padding:5px 10px;color:#c6d98a;font-weight:700}
  .mk-chat{background:#141f34;padding:16px}
  .bub{border-radius:12px 12px 12px 4px;padding:11px 14px;line-height:1.6;font-size:12.5px}
  .bub.user{background:rgba(126,147,207,.16);border:1px solid rgba(126,147,207,.4);color:#e3ebf6;border-radius:12px 12px 4px 12px}
  .jfor{font-family:var(--mono);font-size:12px;color:var(--muted);margin:0 0 12px}
  .mk-ide{display:grid;grid-template-columns:122px 1fr}
  .mk-side{border-right:1px solid var(--line);padding:10px 9px;font-size:10px;line-height:1.95;color:#aebbd6;background:#111c30}
  .mk-side .f{color:#ed9e72}.mk-side .dir{color:#7f8fb0}
  .mk-main{padding:12px 14px;color:#9fb0cc;font-size:10.5px;line-height:1.7}
  .mk-term{font-size:11px;line-height:1.8;color:#cdd9ec}
  .mk-term .p{color:#acc673;font-weight:700}.mk-term .ok{color:#acc673}.mk-term .rn{color:#879ac1}
  .mk-2col{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .mk-2col .h{font-family:var(--mono);font-size:9.5px;letter-spacing:.08em;text-transform:uppercase;margin-bottom:6px;font-weight:700}
  .mk-may .h{color:#acc673}.mk-esc .h{color:#e55e5e}
  .mk-2col .r{font-size:10.5px;color:#cdd9ec;margin-bottom:4px}
  .mk-stat{display:flex;gap:8px;flex-wrap:wrap}
  .mk-stat .s{flex:1 1 0;text-align:center;background:rgba(255,255,255,.04);border:1px solid var(--line);border-radius:8px;padding:9px 6px}
  .mk-stat .s b{display:block;font-family:var(--display);font-size:18px;color:#fff}
  .mk-stat .s span{font-size:9px;color:var(--muted)}
  .mk-stat .s.flag{border-color:rgba(237,158,114,.5)}
  .mk-tbl{width:100%;font-size:10.5px;border-collapse:collapse}
  .mk-tbl td{padding:5px 4px;border-bottom:1px solid var(--line);color:#cdd9ec}
  .mk-tbl .win{color:#acc673;font-weight:700}

  /* principles + takeaways */
  .cols3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
  @media(max-width:820px){.cols3{grid-template-columns:1fr}}
  .prin{background:var(--card);border:1px solid var(--line);border-top:4px solid var(--pc);border-radius:14px;padding:18px 19px}
  .prin .pi{font-size:22px}
  .prin h4{font-family:var(--display);font-size:16px;font-weight:800;margin:8px 0 6px;color:#fff}
  .prin p{margin:0;font-size:13px;line-height:1.55;color:var(--muted)}
  .takes{display:flex;flex-wrap:wrap;gap:10px}
  .take{flex:1 1 220px;background:rgba(255,255,255,.04);border:1px solid var(--line);border-radius:12px;padding:13px 15px}
  .take b{display:block;font-family:var(--display);font-size:14.5px;color:#fff;margin-bottom:3px}
  .take span{font-size:12.5px;color:var(--muted);line-height:1.45}

  footer{margin-top:50px;display:flex;justify-content:space-between;gap:16px;flex-wrap:wrap;align-items:center;color:#aeb9d0;font-size:12.5px;border-top:1px solid var(--line);padding-top:20px}
  .cta{display:inline-flex;align-items:center;gap:9px;font-weight:800;font-size:14px;color:#22314f;background:var(--orange);border-radius:999px;padding:11px 20px;text-decoration:none}
  .brandtag{font-family:var(--mono);letter-spacing:.04em}.brandtag b{color:#ed9e72}

  .home{position:fixed;left:16px;bottom:16px;z-index:9999;display:inline-flex;align-items:center;gap:7px;font-family:var(--display);font-size:13px;font-weight:800;color:#27385c;background:#eef2f9;border:1.5px solid #c7d3e6;border-radius:999px;padding:8px 15px;text-decoration:none;box-shadow:0 6px 20px rgba(15,22,40,.35)}
  .langbar #p0start{margin-right:auto;background:rgba(255,255,255,.06);border-color:var(--line2)}
  .p0bar{position:fixed;top:0;left:0;right:0;z-index:400;display:none;align-items:center;gap:10px;padding:11px 20px;background:rgba(28,40,66,.96);backdrop-filter:blur(10px);border-bottom:2px solid var(--orange);font-family:var(--mono);font-size:13px;color:#cdd9ec}
  .p0bar b{color:#fff;font-family:var(--display);font-size:15px;font-weight:800}
  .p0bar .prog{margin-left:auto;color:var(--muted)}
  .p0ctrl{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);z-index:400;display:none;align-items:center;gap:8px;background:rgba(28,40,66,.96);border:1px solid var(--line2);border-radius:999px;padding:8px 10px;box-shadow:0 14px 38px rgba(10,16,30,.55)}
  .p0ctrl button{font-family:var(--display);font-weight:800;font-size:14px;cursor:pointer;border:none;border-radius:999px;padding:9px 17px}
  .p0ctrl .nav{background:rgba(255,255,255,.08);color:#eef2f9}
  .p0ctrl .nav:disabled{opacity:.35}
  .p0ctrl .next{background:var(--orange);color:#22314f}
  .p0ctrl .exit{background:transparent;color:var(--muted);font-family:var(--mono);font-weight:700;font-size:12px}
  body.presenting .langbar{display:none}
  body.presenting .home,body.presenting #lu-fs{display:none}
  body.presenting .p0bar,body.presenting .p0ctrl{display:flex}
  @media(prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important}}
</style>
</head>

<script>
(function(){
  var lang = localStorage.getItem('lu-lang') || 'en';
  var sel = 1, jstep = 0;
  function t(o){ return (o && typeof o==='object' && ('en' in o)) ? (o[lang]||o.en) : o; }
  var G = {rook:'♜', adept:'♞', master:'♛', gm:'♚'};

  var TXT = {
    eyebrow:{en:'Section 00 · Skills & Roadmap · Agate Level Up', id:'Section 00 · Skill & Roadmap · Agate Level Up'},
    title:{en:['The Skills & Roadmap to Sell B2B ','with AI'], id:['Skill & Roadmap Menjual B2B ','pakai AI']},

      mock:function(){return '<div class="mk"><div class="mk-bar"><i style="background:#e55e5e"></i><i style="background:#ed9e72"></i><i style="background:#acc673"></i><span>run summary ✓</span></div><div class="mk-body"><div class="mk-stat"><div class="s"><b>10</b><span>'+t({en:'accounts',id:'akun'})+'</span></div><div class="s"><b>10</b><span>'+t({en:'proposals',id:'proposal'})+'</span></div><div class="s"><b>1</b><span>'+t({en:'afternoon',id:'sore'})+'</span></div></div><div class="kpi" style="margin-top:10px">3–5× '+t({en:'output',id:'output'})+'</div></div></div>';} }
  ];

  var J_GM = [
    { name:{en:'Give the agent a personality',id:'Beri agen kepribadian'},
      do:{en:'You write the agent persona and system prompt: who it is, its tone, how it opens, when it pushes.',id:'Kamu tulis persona & system prompt agen: siapa dia, tone-nya, cara membuka, kapan mendorong.'},
      get:{en:'“Atlas” — a transparent, proactive AI sales agent — is born.',id:'“Atlas” — AI sales agent yang transparan & proaktif — lahir.'},
      mock:function(){return '<div class="mk"><div class="mk-bar"><i style="background:#e55e5e"></i><i style="background:#ed9e72"></i><i style="background:#acc673"></i><span>agent-persona.md · system prompt</span></div><div class="mk-body"><div class="head">ROLE: “Atlas” — Autonomous Sales Agent</div><div>• '+t({en:'introduce yourself as an AI',id:'perkenalkan diri sebagai AI'})+'</div><div>• '+t({en:'proactive: end every turn with a next step',id:'proaktif: akhiri tiap giliran dengan langkah maju'})+'</div><div>• '+t({en:'tone: confident, concise, warm',id:'tone: percaya diri, ringkas, hangat'})+'</div></div></div>';} },
    { name:{en:'Set the guardrails',id:'Pasang guardrail'},
      do:{en:'Define its authority: what it may do alone, and what it must escalate to a human.',id:'Definisikan wewenang: apa yang boleh sendiri, dan apa yang wajib dieskalasi ke manusia.'},
      get:{en:'The agent can act safely — within bounds.',id:'Agen bisa bertindak aman — dalam batas.'},
      mock:function(){return '<div class="mk"><div class="mk-bar"><i style="background:#e55e5e"></i><i style="background:#ed9e72"></i><i style="background:#acc673"></i><span>guardrails.md</span></div><div class="mk-body"><div class="mk-2col"><div class="mk-may"><div class="h">✓ '+t({en:'May do alone',id:'Boleh sendiri'})+'</div><div class="r">'+t({en:'discount ≤ 10%',id:'diskon ≤ 10%'})+'</div><div class="r">'+t({en:'standard contract',id:'kontrak standar'})+'</div><div class="r">'+t({en:'book kickoff',id:'jadwalkan kickoff'})+'</div></div><div class="mk-esc"><div class="h">⚠ '+t({en:'Must escalate',id:'Wajib eskalasi'})+'</div><div class="r">'+t({en:'discount > 10%',id:'diskon > 10%'})+'</div><div class="r">'+t({en:'deal > Rp500jt',id:'deal > Rp500jt'})+'</div><div class="r">'+t({en:'legal / complaints',id:'legal / komplain'})+'</div></div></div></div></div>';} },
    { name:{en:'Deploy — it works 24/7',id:'Deploy — bekerja 24/7'},
      do:{en:'The agent handles first-touch on web and WhatsApp: qualifies (BANT), answers, books demos — day and night.',id:'Agen menangani first-touch di web & WhatsApp: qualify (BANT), menjawab, jadwalkan demo — siang malam.'},
      get:{en:'Leads move while you sleep; clean hand-off to humans for closing.',id:'Lead bergerak saat kamu tidur; hand-off rapi ke manusia untuk closing.'},
      mock:function(){return '<div class="mk mk-chat"><div style="font-family:var(--mono);font-size:10px;color:#ed9e72;margin-bottom:8px">● ATLAS · AI AGENT · 02:14</div><div class="bub" style="background:rgba(237,158,114,.14);border:1px solid rgba(237,158,114,.4);color:#f4d3ba;border-radius:12px 12px 4px 12px;margin-bottom:8px">'+t({en:'Hi! I am Atlas, an AI agent for Level Up. What would you like to improve — engagement or people growth?',id:'Halo! Saya Atlas, AI agent Level Up. Apa yang ingin Anda tingkatkan — engagement atau people growth?'})+'</div><div class="bub user">'+t({en:'training for 500 staff, this quarter',id:'training 500 staff, kuartal ini'})+'</div></div>';} },
    { name:{en:'Supervise the pipeline',id:'Awasi pipeline'},
      do:{en:'You watch a dashboard, not a chat. Handle only the escalations the agent flags.',id:'Kamu memantau dashboard, bukan chat. Tangani hanya eskalasi yang ditandai agen.'},
      get:{en:'One person supervises what used to take a team.',id:'Satu orang mengawasi yang dulu butuh satu tim.'},
      mock:function(){return '<div class="mk"><div class="mk-bar"><i style="background:#e55e5e"></i><i style="background:#ed9e72"></i><i style="background:#acc673"></i><span>pipeline · live</span></div><div class="mk-body"><div class="mk-stat"><div class="s"><b>40</b><span>'+t({en:'prospects',id:'prospek'})+'</span></div><div class="s"><b>12</b><span>qualified</span></div><div class="s"><b>5</b><span>closed</span></div><div class="s flag"><b style="color:#ed9e72">2</b><span>'+t({en:'escalations',id:'eskalasi'})+'</span></div></div></div></div>';} },
    { name:{en:'Measure the machine',id:'Ukur mesinnya'},
      do:{en:'Track impact with Extended Kirkpatrick: behavior → results → ROI → ecosystem — not activity.',id:'Lacak dampak dengan Extended Kirkpatrick: perilaku → hasil → ROI → ekosistem — bukan aktivitas.'},
      get:{en:'8–15× leverage across the whole org. This is the Architect.',id:'Leverage 8–15× ke seluruh organisasi. Inilah Architect.'},
      mock:function(){return '<div class="mk"><div class="mk-bar"><i style="background:#e55e5e"></i><i style="background:#ed9e72"></i><i style="background:#acc673"></i><span>impact · Extended Kirkpatrick</span></div><div class="mk-body"><div class="rev">L3 · '+t({en:'behavior change',id:'perubahan perilaku'})+' ▲</div><div class="rev">L4 · '+t({en:'business results',id:'hasil bisnis'})+' ▲</div><div class="rev">L5 · ROI 3.5×</div><div class="rev">L6 · '+t({en:'ecosystem health',id:'kesehatan ekosistem'})+'</div><div class="kpi" style="margin-top:8px">8–15× leverage</div></div></div>';} }
  ];

  var JOURNEYS = { rook:J_ROOK, adept:J_ADEPT, master:J_MASTER, gm:J_GM };
  function curJourney(){ return JOURNEYS[RANKS[sel].key] || J_ADEPT; }

  var PRINS = [
    { i:'🧭', c:'#5769aa', h:{en:'Humans are always in control',id:'Manusia selalu memegang kendali'}, p:{en:'AI recommends, humans decide. Every output goes through human review — no exceptions. Your judgment and craft don\'t change.',id:'AI merekomendasikan, manusia memutuskan. Setiap output lewat review manusia — tanpa kecuali. Judgment dan keahlianmu tidak berubah.'} },
    { i:'🔒', c:'#e55e5e', h:{en:'Data & IP is non-negotiable',id:'Data & IP tidak bisa ditawar'}, p:{en:'Client data, internal data and creative IP stay protected. NDA-compliant, ISO 27001. No proprietary assets enter AI tools without safeguards.',id:'Data klien, data internal & IP kreatif tetap terlindungi. Patuh NDA, ISO 27001. Tidak ada aset rahasia masuk ke tool AI tanpa pengaman.'} },
    { i:'🌱', c:'#acc673', h:{en:'Roles will evolve — so should we',id:'Peran akan berubah — kita juga harus'}, p:{en:'Some of what you do today will be done differently in a year. The person who benefits most from learning AI is you — for your future, not just now.',id:'Sebagian pekerjaanmu hari ini akan dilakukan berbeda tahun depan. Yang paling diuntungkan dari belajar AI adalah kamu — untuk masa depanmu, bukan cuma sekarang.'} }
  ];

  var TAKES = [
    { b:{en:'Urgency is real',id:'Urgensinya nyata'}, s:{en:'2.5-year skill half-life; the war for talent is intensifying. Transformation can\'t wait.',id:'Skill separuh-usia 2,5 tahun; perang talenta makin sengit. Transformasi tak bisa menunggu.'} },
    { b:{en:'AI is not a silver bullet',id:'AI bukan peluru ajaib'}, s:{en:'Technology amplifies — it does not replace. Good strategy and strong culture still required.',id:'Teknologi memperkuat — bukan menggantikan. Strategi bagus & budaya kuat tetap wajib.'} },
    { b:{en:'Human + AI is optimal',id:'Manusia + AI paling optimal'}, s:{en:'Divide by strength: AI does personalization & analytics; humans do mentoring & judgment.',id:'Bagi sesuai kekuatan: AI untuk personalisasi & analitik; manusia untuk mentoring & judgment.'} },
    { b:{en:'Measurement compounds',id:'Pengukuran berlipat'}, s:{en:'More learning data → better AI recommendations → greater impact. A flywheel.',id:'Makin banyak data belajar → rekomendasi AI makin baik → dampak makin besar. Roda gila.'} },
    { b:{en:'Behavior change is the goal',id:'Perubahan perilaku itu tujuannya'}, s:{en:'Success isn\'t completion rate — it\'s measurable behavior, applied on the job.',id:'Sukses bukan tingkat penyelesaian — tapi perilaku terukur, diterapkan di pekerjaan.'} }
  ];

  function esc(s){return s;}
  function render(){
    document.querySelectorAll('.langbar button').forEach(function(b){b.classList.toggle('on', b.dataset.l===lang);});
    document.getElementById('h-eyebrow').textContent = t(TXT.eyebrow);
    document.getElementById('h-title').innerHTML = t(TXT.title)[0] + '<span class="hl">' + t(TXT.title)[1] + '</span>';
    document.getElementById('h-lede').textContent = t(TXT.lede);
    document.getElementById('h-journey').innerHTML = '<span class="from">● '+t(TXT.from)+'</span><span class="arw">———→</span><span class="to">'+t(TXT.to)+' ●</span>';
    document.getElementById('h-src').innerHTML = '📘 '+t(TXT.src);
    document.getElementById('hA').innerHTML = '<span class="sec-n">A</span><h2 class="sec-t">'+t(TXT.hA)+'</h2>';
    document.getElementById('sA').textContent = t(TXT.sA);
    document.getElementById('hB').innerHTML = '<span class="sec-n">B</span><h2 class="sec-t">'+t(TXT.hB)+'</h2>';
    document.getElementById('sB').textContent = t(TXT.sB);
    document.getElementById('hC').innerHTML = '<span class="sec-n">C</span><h2 class="sec-t">'+t(TXT.hC)+'</h2>';
    document.getElementById('sC').textContent = t(TXT.sC);
    document.getElementById('hD').innerHTML = '<span class="sec-n">D</span><h2 class="sec-t">'+t(TXT.hD)+'</h2>';
    document.getElementById('f-tag').innerHTML = t(TXT.fTag);
    document.getElementById('f-sub').textContent = t(TXT.fSub);
    document.getElementById('f-cta').textContent = t(TXT.fCta);

    document.getElementById('ranks').innerHTML = RANKS.map(function(r,i){
      return '<div class="rank" data-i="'+i+'" aria-selected="'+(i===sel)+'" style="--rc:'+r.color+'">'+
        '<span class="rung">'+r.rung+'</span><div class="glyph">'+G[r.key]+'</div>'+
        '<div class="rname">'+r.name+'</div><div class="role">'+t(r.role)+'</div>'+
        '<div class="mult">'+r.mult+'</div><div class="pop">'+t(r.pop)+'</div></div>';
    }).join('');
    renderDetail();
    renderTabs(); renderPanel();

    document.getElementById('prins').innerHTML = PRINS.map(function(p){
      return '<div class="prin" style="--pc:'+p.c+'"><div class="pi">'+p.i+'</div><h4>'+t(p.h)+'</h4><p>'+t(p.p)+'</p></div>';
    }).join('');
    document.getElementById('takes').innerHTML = TAKES.map(function(x){
      return '<div class="take"><b>'+t(x.b)+'</b><span>'+t(x.s)+'</span></div>';
    }).join('');
  }

  function renderDetail(){
    var r = RANKS[sel];
    var cur = t(r.current).map(function(s){return '<div class="li"><span class="b"></span><span>'+s+'</span></div>';}).join('');
    var todo = t(r.todo).map(function(s){return '<div class="li"><span class="b"></span><span>'+s+'</span></div>';}).join('');
    var prac = r.practice.map(function(p){return '<a class="plink" href="'+p.h+'">'+t(p.l)+'<span class="go">→</span></a>';}).join('');
    document.getElementById('detail').innerHTML =
      '<div class="detail" style="--dc:'+r.color+'">'+
        '<div class="dhead"><div class="dglyph">'+G[r.key]+'</div>'+
          '<div><div class="dtitle">'+r.name+' — '+t(r.role)+'</div><div class="drole">'+r.rung+'</div></div>'+
          '<div class="dmeta"><div class="m">'+r.mult+'</div><div class="p">'+t(r.pop)+'</div></div></div>'+
        '<div class="quote">'+t(r.quote)+'</div>'+
        '<div class="cgt">'+
          '<div class="box gcur"><div class="blabel">📍 '+t(TXT.lCur)+'</div>'+cur+'</div>'+
          '<div class="box ggoal"><div class="blabel">🎯 '+t(TXT.lGoal)+'</div><div class="goaltext">'+t(r.goal)+'</div></div>'+
          '<div class="box gtodo"><div class="blabel">🛠️ '+t(TXT.lTodo)+'</div><div class="todo-grid">'+todo+'</div>'+
            '<div class="practice"><span style="font-family:var(--mono);font-size:10.5px;color:var(--muted);align-self:center;text-transform:uppercase;letter-spacing:.1em">'+t(TXT.lPractice)+':</span>'+prac+'</div></div>'+
        '</div>'+
        '<div class="levelup">'+t(r.levelup)+'</div>'+
      '</div>';
    document.querySelectorAll('.rank').forEach(function(el){
      el.addEventListener('click', function(){ sel=+el.dataset.i; jstep=0; render(); });
    });
  }

  function renderTabs(){
    var J=curJourney();
    document.getElementById('jfor').innerHTML = t(TXT.jFor)+' <b style="color:'+RANKS[sel].color+'">'+RANKS[sel].name+'</b> — '+t(RANKS[sel].role);
    document.getElementById('jtabs').innerHTML = J.map(function(s,i){
      return '<div class="jtab" data-j="'+i+'" aria-selected="'+(i===jstep)+'"><span class="num">'+(i+1)+'</span>'+t(s.name)+'</div>';
    }).join('');
    document.querySelectorAll('.jtab').forEach(function(el){
      el.addEventListener('click', function(){ jstep=+el.dataset.j; renderTabs(); renderPanel(); });
    });
  }
  function renderPanel(){
    var J=curJourney(); if(jstep>=J.length)jstep=0;
    var s = J[jstep];
    document.getElementById('jpanel').innerHTML =
      '<div class="jpanel"><div class="jleft">'+
        '<div class="jstep">STEP '+(jstep+1)+' / '+J.length+'</div>'+
        '<div class="jname"><span style="color:#ed9e72">'+(jstep+1)+'.</span> '+t(s.name)+'</div>'+
        '<div class="jblock do"><div class="jl">'+t(TXT.jDo)+'</div><p>'+t(s.do)+'</p></div>'+
        '<div class="jblock get"><div class="jl">'+t(TXT.jGet)+'</div><p>'+t(s.get)+'</p></div>'+
        '<div class="jarrows">'+(jstep>0?'<button class="jbtn" data-nav="-1">'+t(TXT.jPrev)+'</button>':'')+
          (jstep<J.length-1?'<button class="jbtn p" data-nav="1">'+t(TXT.jNext)+'</button>':'')+'</div>'+
      '</div><div class="jright">'+s.mock()+'</div></div>';
    document.querySelectorAll('#jpanel [data-nav]').forEach(function(b){
      b.addEventListener('click', function(){ jstep += (+b.dataset.nav); renderTabs(); renderPanel(); });
    });
  }

  document.querySelectorAll('.langbar button').forEach(function(b){
    b.addEventListener('click', function(){ lang=b.dataset.l; localStorage.setItem('lu-lang',lang); render(); });
  });
  render();

  // fullscreen
  var fb=document.getElementById('lu-fs');
  function fu(){fb.textContent=document.fullscreenElement?'⤢ Exit full screen':'⛶ Full screen';}
  fb.addEventListener('click',function(){if(document.fullscreenElement){document.exitFullscreen();}else{document.documentElement.requestFullscreen().catch(function(){});}});
  document.addEventListener('fullscreenchange',fu);fu();

  // ---- presentation mode (continues from the home) ----
  var P0=[
    {name:'Overview · Skills & Roadmap', scroll:'top'},
    {name:'Rank 1 · ROOK (the trap)', rank:0},
    {name:'Rank 2 · ADEPT', rank:1},
    {name:'Rank 3 · MASTER', rank:2},
    {name:'Rank 4 · GRANDMASTER', rank:3},
    {name:'The learning journey', scroll:'jtabs'},
    {name:'The 3 non-negotiables', scroll:'hC'},
    {name:'Why it matters now', scroll:'hD'}
  ];
  var p0i=0, p0on=false, p0anim=null;
  var p0name=document.getElementById('p0name'), p0prog=document.getElementById('p0prog'),
      p0prev=document.getElementById('p0prev'), p0next=document.getElementById('p0next');
  function p0scroll(el){
    if(p0anim)cancelAnimationFrame(p0anim);
    var target=el.getBoundingClientRect().top+window.pageYOffset-64, start=window.pageYOffset, dist=target-start;
    var dur=Math.min(900,Math.max(450,Math.abs(dist)*0.5)), t0=null;
    function step(ts){ if(t0===null)t0=ts; var p=Math.min(1,(ts-t0)/dur); var e=p<0.5?4*p*p*p:1-Math.pow(-2*p+2,3)/2; window.scrollTo({top:start+dist*e,behavior:'auto'}); if(p<1)p0anim=requestAnimationFrame(step); }
    p0anim=requestAnimationFrame(step);
  }
  function p0show(){
    var s=P0[p0i];
    if(typeof s.rank==='number'){ sel=s.rank; jstep=0; render(); }
    p0name.textContent=s.name; p0prog.textContent=(p0i+1)+' / '+P0.length;
    p0prev.disabled=p0i===0; p0next.textContent=p0i===P0.length-1?'Done ✓':'Next →';
    var el = s.scroll==='top' ? document.querySelector('header') : (typeof s.rank==='number' ? document.getElementById('detail') : document.getElementById(s.scroll));
    if(el) p0scroll(el);
  }
  function p0go(n){ p0i=Math.max(0,Math.min(P0.length-1,p0i+n)); p0show(); }
  function p0enter(){ p0on=true; document.body.classList.add('presenting'); p0i=0; if(document.documentElement.requestFullscreen)document.documentElement.requestFullscreen().catch(function(){}); p0show(); }
  function p0exit(){ p0on=false; document.body.classList.remove('presenting'); if(document.fullscreenElement)document.exitFullscreen().catch(function(){}); }
  document.getElementById('p0start').addEventListener('click',p0enter);
  p0next.addEventListener('click',function(){ p0i===P0.length-1?p0exit():p0go(1); });
  p0prev.addEventListener('click',function(){p0go(-1);});
  document.getElementById('p0exit').addEventListener('click',p0exit);
  document.addEventListener('keydown',function(e){ if(!p0on)return; if(e.key==='ArrowRight'||e.key==='PageDown'||e.key===' '){e.preventDefault();p0go(1);} else if(e.key==='ArrowLeft'||e.key==='PageUp'){e.preventDefault();p0go(-1);} else if(e.key==='Escape'){p0exit();} });
  if(/[?&]present=1/.test(location.search)||location.hash==='#present'){ setTimeout(p0enter,500); }
})();
</script>
</body>
</html>
